name: Update Vietnam Economic Newsletter

on:
  workflow_dispatch:
  schedule:
    # Daily 07:00 KST
    - cron: "0 7 * * *"
      timezone: "Asia/Seoul"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  LOOKBACK_HOURS: "720"
  MAX_ITEMS_TO_SUMMARIZE: "80"
  DASHBOARD_MAX_ITEMS: "100"
  OPENAI_MODEL: "gpt-4.1-mini"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm config set registry https://registry.npmjs.org/
          npm install --registry=https://registry.npmjs.org/ --no-audit --no-fund --package-lock=false

      - name: Collect, deduplicate, and summarize data
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run fetch

      - name: Check generated data
        run: |
          echo "Checking generated files..."
          ls -la data
          if [ ! -f data/news.json ]; then
            echo "data/news.json was not created"
            exit 1
          fi
          cat data/news.json | head -40

      - name: Prepare static site
        run: |
          rm -rf _site
          mkdir -p _site/data

          cp index.html _site/
          cp style.css _site/
          cp app.js _site/
          cp data/news.json _site/data/news.json

          if [ -d assets ]; then
            cp -R assets _site/assets
          fi

          if [ -f data/fetch-log.json ]; then
            cp data/fetch-log.json _site/data/fetch-log.json
          fi

          touch _site/.nojekyll

          echo "Static site files:"
          find _site -maxdepth 3 -type f -print

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
