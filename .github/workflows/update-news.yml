name: Update Vietnam Economic Newsletter

on:
  workflow_dispatch:
  issues:
    types: [opened, reopened, edited, closed]
  schedule:
    # Daily 07:00 KST
    - cron: "0 7 * * *"
      timezone: "Asia/Seoul"

permissions:
  contents: read
  issues: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  LOOKBACK_HOURS: "720"
  SNS_LOOKBACK_DAYS: "30"
  MAX_ITEMS_TO_SUMMARIZE: "80"
  DASHBOARD_MAX_ITEMS: "100"
  OPENAI_MODEL: "gpt-4.1-mini"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  collect-and-deploy:
    if: github.event_name != 'issues' || startsWith(github.event.issue.title, '[모니터링 제외]')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm config set registry https://registry.npmjs.org/
          npm install --registry=https://registry.npmjs.org/ --no-audit --no-fund --package-lock=false

      - name: Synchronize monitoring exclusions from GitHub Issues
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run sync:exclusions

      - name: Collect, deduplicate, and summarize data
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run fetch

      - name: Collect YouTube and approved Facebook data
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FACEBOOK_PAGES_JSON: ${{ secrets.FACEBOOK_PAGES_JSON }}
        run: npm run fetch:sns

      - name: Check generated data
        run: |
          echo "Checking generated files..."
          ls -la data
          if [ ! -f data/news.json ]; then
            echo "data/news.json was not created"
            exit 1
          fi
          if [ ! -f data/sns.json ]; then
            echo "data/sns.json was not created"
            exit 1
          fi
          if [ ! -f data/exclusions.json ]; then
            echo "data/exclusions.json was not created"
            exit 1
          fi
          cat data/news.json | head -40
          cat data/sns.json | head -60

      - name: Prepare static site
        run: |
          if ! grep -q 'id="sns-monitor"' index.html; then
            echo "SNS monitor section is missing from index.html"
            exit 1
          fi

          rm -rf _site
          mkdir -p _site/data

          cp index.html _site/
          cp style.css _site/
          cp app.js _site/
          cp data/news.json _site/data/news.json
          cp data/sns.json _site/data/sns.json
          cp data/exclusions.json _site/data/exclusions.json

          if [ -d assets ]; then
            cp -R assets _site/assets
          fi

          if [ -f data/fetch-log.json ]; then
            cp data/fetch-log.json _site/data/fetch-log.json
          fi

          touch _site/.nojekyll

          if ! grep -q 'id="sns-monitor"' _site/index.html; then
            echo "SNS monitor section is missing from deployment artifact"
            exit 1
          fi

          echo "Static site files:"
          find _site -maxdepth 3 -type f -print

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
