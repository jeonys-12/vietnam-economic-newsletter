name: Update Vietnam Economic Newsletter

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  schedule:
    # 07:00 and 12:00 KST
    - cron: "0 7,12 * * *"
      timezone: "Asia/Seoul"

permissions:
  contents: write
  pages: write
  id-token: write

env:
  LOOKBACK_HOURS: "48"
  MAX_ITEMS_TO_SUMMARIZE: "80"
  OPENAI_MODEL: "gpt-4.1-mini"

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Collect, deduplicate, and summarize data
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run fetch

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json data/fetch-log.json
          git commit -m "Update Vietnam newsletter data" || echo "No data changes"
          git pull --rebase || true
          git push || echo "Push skipped or no changes"

      - name: Prepare static site
        run: |
          rm -rf _site
          mkdir -p _site/data
          cp index.html style.css app.js _site/
          cp data/news.json _site/data/news.json
          if [ -f data/fetch-log.json ]; then cp data/fetch-log.json _site/data/fetch-log.json; fi
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
